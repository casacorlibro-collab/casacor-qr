<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASACOR Bolivia</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #283a17; /* Fondo verde profundo */
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #e9e9e9; /* Letras crema */
      -webkit-font-smoothing: antialiased;
    }
    .branding {
      text-align: center;
      margin-bottom: 45px;
      padding: 0 20px;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase; 
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .location {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      margin-bottom: 20px;
      color: #cbd5c2; /* Bolivia en línea aparte y tono suave */
    }
    .dates {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    /* Loader de puntos con tus colores específicos */
    .loader {
      display: flex;
      gap: 10px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out;
    }
    .dot:nth-child(1) { background-color: #e9e9e9; } /* Crema */
    .dot:nth-child(2) { background-color: #364f20; animation-delay: 0.2s; } /* Verde olivo */
    .dot:nth-child(3) { background-color: #e9e9e9; animation-delay: 0.4s; } /* Crema */

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.6; }
      40% { transform: scale(1.2); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="branding">
    <div class="title">CASACOR</div>
    <div class="subtitle">Mente y Corazón</div>
    <div class="location">Bolivia</div>
    <div class="dates">13 de mayo al 20 de junio</div>
  </div>

  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    // Conexión directa con tu Google Apps Script
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxPN6E43Bqgm2qhgWPDI0DtMFT4e5MTLq1IZAT-E-6eyPg9mkZ2Bm5LJPZgUTPv4WMS/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const k = urlParams.get('k');

    if (k) {
      fetch(`${WEB_APP_URL}?k=${encodeURIComponent(k)}`)
        .then(response => response.text())
        .then(targetUrl => {
          if (targetUrl && targetUrl.startsWith('http')) {
            window.location.replace(targetUrl);
          }
        })
        .catch(err => console.error("Error de redirección:", err));
    }
  </script>
</body>
</html>
